[include homing_mesh.cfg]
[include klicky-variables.cfg]                
[include klicky-macros.cfg] 
[include macros.cfg] 
[include print_area_bed_mesh.cfg]
[include heat_soak.cfg]
[include moonraker_obico_macros.cfg]

[exclude_object]

[mcu] # left Octo w/motion steppers
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_160007000750534E4E313120-if00

[mcu octo2] # right Octo w/4 extruders
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_210017001650535556323420-if00

